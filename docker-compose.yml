version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backend/app:/app/app
    environment:
      - DATABASE_URL=sqlite:///./data/brain.db
      - CHROMA_PERSIST_DIR=./data/chroma
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - ALLOW_REMOTE_CLIENTS=True
    depends_on:
      - ollama

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/package.json:/app/package.json
      - ./frontend/vite.config.ts:/app/vite.config.ts
      
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - second-brain_ollama_data:/root/.ollama

volumes:
  # Using the existing volume from before the folder move
  second-brain_ollama_data:
    external: true
